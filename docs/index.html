<div class="barbell">
    <div class="plate left-plate">45</div>
    <div class="bar"></div>
    <div class="plate right-plate">45</div>
</div>
<style>
  .barbell {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bar {
    width: 60%;
    height: 20px;
    background: #333;
    border-radius: 10px;
    position: relative;
  }
  .plate {
    width: 30px;
    height: 30px;
    background: #f00;
    border-radius: 50%;
    position: absolute;
    top: -5px;
  }
  .left-plate {
    left: -35px;
    animation: pulse 1s infinite;
  }
  .right-plate {
    right: -35px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.2);
    }
  }
</style>
